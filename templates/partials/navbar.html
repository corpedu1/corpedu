<header class="topbar">
    <div class="container topbar__content">
        <a class="brand" href="/">CyberLearn Витте</a>
        <nav class="topbar__nav">
            <a href="/">Главная</a>
            <a href="/about/">О нас</a>
            <a href="/contacts/">Контакты</a>
            <a href="/feedback/">Обратная связь</a>
            <a href="/faq/">FAQ</a>
        </nav>
        <div class="topbar__actions">
            {% if request.user.is_authenticated %}
                <span class="topbar__user">{{ request.user.username }}</span>
                <form method="post" action="/logout/" class="topbar__logout-form">
                    {% csrf_token %}
                    <button type="submit" class="topbar__action-link topbar__logout-button">Выход</button>
                </form>
            {% else %}
                <a class="topbar__action-link" href="/register/">Регистрация</a>
                <a class="topbar__action-link" href="/login/">Войти</a>
            {% endif %}
        </div>
    </div>
</header>
