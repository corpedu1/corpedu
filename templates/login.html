<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | CyberLearn Витте</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/landing.css' %}">
</head>
<body class="register-page-layout">
    {% include "partials/navbar.html" %}

    <main class="register-main">
        <section class="section register-page">
            <div class="container register-page__container">
                <div class="register-form-container">
                    <p class="register-title">Вход</p>
                    <form class="register-form" action="/login/" method="post">
                        {% csrf_token %}
                        {% if form.non_field_errors %}
                            <div class="register-form-errors">
                                {% for error in form.non_field_errors %}
                                    <p>{{ error }}</p>
                                {% endfor %}
                            </div>
                        {% endif %}
                        <div class="register-input-group">
                            <label for="login_username">Логин</label>
                            <input type="text" name="username" id="login_username" placeholder="Введите логин" value="{{ form.username.value|default:'' }}">
                        </div>
                        <div class="register-input-group">
                            <label for="login_password">Пароль</label>
                            <input type="password" name="password" id="login_password" placeholder="Введите пароль">
                        </div>
                        <button class="register-submit" type="submit">Войти</button>
                    </form>
                    <p class="register-signin">Нет аккаунта?
                        <a rel="noopener noreferrer" href="/register/">Регистрация</a>
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer__content">
            <p>Платформа корпоративного обучения по информационной безопасности</p>
            <a href="/register/">Создать аккаунт</a>
        </div>
    </footer>
</body>
</html>
