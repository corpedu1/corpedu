<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | CyberLearn Витте</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/landing.css' %}">
</head>
<body class="register-page-layout">
    {% include "partials/navbar.html" %}

    <main class="register-main">
        <section class="section register-page">
            <div class="container register-page__container">
                <div class="register-form-container">
                    <p class="register-title">Регистрация</p>
                    <form class="register-form" action="#" method="post">
                        <div class="register-input-group">
                            <label for="register_login">Логин</label>
                            <input type="text" name="login" id="register_login" placeholder="Введите логин">
                        </div>
                        <div class="register-input-group">
                            <label for="register_name">Имя</label>
                            <input type="text" name="name" id="register_name" placeholder="Введите имя">
                        </div>
                        <div class="register-input-group">
                            <label for="register_surname">Фамилия</label>
                            <input type="text" name="surname" id="register_surname" placeholder="Введите фамилию">
                        </div>
                        <div class="register-input-group">
                            <label for="register_password">Пароль</label>
                            <input type="password" name="password" id="register_password" placeholder="Введите пароль">
                        </div>
                        <div class="register-input-group">
                            <label for="register_password_repeat">Подтвердить пароль</label>
                            <input type="password" name="password_repeat" id="register_password_repeat" placeholder="Повторите пароль">
                        </div>
                        <button class="register-submit" type="submit">Зарегистрироваться</button>
                    </form>
                    <p class="register-signin">Уже есть аккаунт?
                        <a rel="noopener noreferrer" href="/login/">Войти</a>
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer__content">
            <p>Платформа корпоративного обучения по информационной безопасности</p>
            <a href="/login/">Перейти к авторизации</a>
        </div>
    </footer>
</body>
</html>
